name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up test environment
      run: |
        mkdir -p test_dir
        echo "test content" > test_dir/foo.txt

    - name: Run test script
      run: |
        chmod +x test/test_raname.sh
        ./test/test_raname.sh

    - name: Test script directly
      run: |
        chmod +x bin/raname.sh
        ./bin/raname.sh --dry-run foo bar test_dir
        ./bin/raname.sh foo bar test_dir 